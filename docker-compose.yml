version: '3.8'

services:
  network-test-api:
    build: .
    container_name: network-test-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:////data/test_tasks.db
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    volumes:
      # Mount vless-tester submodule (relative path)
      - ./vless-tester:/app/vless-tester:ro
      # Persist database
      - ./data:/data
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
